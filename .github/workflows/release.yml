name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and image names
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "api_image=ghcr.io/${REPO_LOWER}/api" >> $GITHUB_OUTPUT
          echo "web_image=ghcr.io/${REPO_LOWER}/web" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.version.outputs.api_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.api_image }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.version.outputs.web_image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.web_image }}:latest

      - name: Package Helm chart
        run: |
          helm package deploy/helm/mailit --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: mailit-*.tgz
          generate_release_notes: true
